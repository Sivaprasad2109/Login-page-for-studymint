<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyMint Portal</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background-color: #f0f4ff; color: #002b5c; }
  nav { background-color: #002b5c; padding: 10px 20px; display: flex; justify-content: space-around; }
  nav a { color: white; text-decoration: none; font-weight: bold; }
  .page { display: none; padding: 30px; }
  .active { display: block; }
  .panel { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 600px; margin: 40px auto; text-align: center; }
  .btn { background-color: #004c99; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
  .btn:hover { background-color: #005ce6; }
  /* Admin Panel */
  .admin-panel { background-color: #000; color: #fff; padding: 20px; border-radius: 10px; }
  .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  .admin-table th, .admin-table td { padding: 10px; border: 1px solid #333; text-align: center; }
  .admin-header { background-color: #004c99; padding: 15px; border-radius: 8px; }
  /* Login Modal Split */
  #loginModal { position: fixed; top:0; left:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .login-container { background: white; border-radius: 10px; width: 700px; display: flex; overflow: hidden; }
  .login-section { flex: 1; padding: 20px; }
  .login-section h2 { margin-bottom: 10px; }
  input { width: 90%; padding: 10px; margin: 10px 0; }
</style>
</head>
<body>

<nav id="navbar">
  <a href="#" onclick="logout()">Logout</a>
  <a href="#" id="navDashboard" onclick="showPage('dashboard')">Dashboard</a>
  <a href="#" id="navHistory" onclick="showPage('history')">Coin History</a>
  <a href="#" id="navRedeem" onclick="showPage('redeem')">Redeem Coins</a>
  <a href="#" id="navAdmin" onclick="showPage('adminPanel')">Withdrawal Requests</a>
</nav>

<!-- User Dashboard -->
<div id="dashboard" class="page">
  <div class="panel">
    <h2>Dashboard</h2>
    <p><strong>Email:</strong> <span id="dashEmail">Loading...</span></p>
    <p><strong>User ID:</strong> <span id="dashUserID">Loading...</span></p>
    <p><strong>Coins:</strong> <span id="dashCoins">Loading...</span> SM Coins</p>
  </div>
</div>

<!-- Coin History -->
<div id="history" class="page">
  <div class="panel">
    <h2>Coin History</h2>
    <ul id="coinHistory"></ul>
  </div>
</div>

<!-- Redeem Coins -->
<div id="redeem" class="page">
  <div class="panel">
    <h2>Redeem Coins</h2>
    <input type="text" id="redeemUserID" placeholder="Enter User ID"><br>
    <input type="number" id="redeemCoins" placeholder="Enter Coins"><br>
    <input type="text" id="redeemUPI" placeholder="Enter UPI ID"><br>
    <button class="btn" onclick="redeemCoins()">Submit Request</button>
    <p id="redeemMsg"></p>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="page">
  <div class="admin-panel">
    <div class="admin-header"><h2>Pending Withdrawal Requests</h2></div>
    <table class="admin-table" id="withdrawTable">
      <thead>
        <tr><th>User ID</th><th>Coins</th><th>UPI</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal">
  <div class="login-container">
    <!-- User Login -->
    <div class="login-section" style="border-right:1px solid #ccc;">
      <h2>User Login</h2>
      <input type="email" id="loginEmail" placeholder="Enter email">
      <button onclick="sendLoginOTP()" class="btn">Send OTP</button><br>
      <input type="text" id="loginOTP" placeholder="Enter OTP">
      <button onclick="verifyLoginOTP()" class="btn">Verify OTP</button>
      <p id="loginMessage" style="color: red;"></p>
    </div>
    <!-- Admin Login -->
    <div class="login-section">
      <h2>Admin Login</h2>
      <input type="text" id="adminUsername" placeholder="Username">
      <input type="password" id="adminPassword" placeholder="Password">
      <button onclick="adminLogin()" class="btn">Login</button>
      <p id="adminLoginMessage" style="color: red;"></p>
    </div>
  </div>
</div>

<script>
const BASE_URL = "http://localhost:3000";

// Nav show/hide
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(pageId==="dashboard") loadDashboard();
  if(pageId==="history") loadHistory();
  if(pageId==="adminPanel") loadWithdrawRequests();
}

// Logout
function logout(){
  localStorage.clear();
  location.reload();
}

// User OTP login
function sendLoginOTP(){
  fetch(`${BASE_URL}/send-otp`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ email: document.getElementById("loginEmail").value })
  }).then(res=>res.json())
    .then(data=> document.getElementById("loginMessage").innerText = data.message)
    .catch(()=> document.getElementById("loginMessage").innerText = "Error sending OTP");
}
function verifyLoginOTP(){
  fetch(`${BASE_URL}/verify-otp`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: document.getElementById("loginEmail").value,
      otp: document.getElementById("loginOTP").value
    })
  }).then(res=>res.json())
    .then(data=>{
      if(data.userID){
        localStorage.setItem("userEmail", document.getElementById("loginEmail").value);
        localStorage.setItem("isAdmin","false");
        document.getElementById("loginModal").style.display="none";
        document.getElementById("navAdmin").style.display="none";
        showPage("dashboard");
      } else {
        document.getElementById("loginMessage").innerText = "Invalid OTP";
      }
    });
}

// Admin Login
function adminLogin(){
  fetch(`${BASE_URL}/admin-login`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username: document.getElementById("adminUsername").value,
      password: document.getElementById("adminPassword").value
    })
  }).then(res=>res.json())
    .then(data=>{
      if(data.success){
        localStorage.setItem("isAdmin","true");
        document.getElementById("loginModal").style.display="none";
        document.getElementById("navDashboard").style.display="none";
        document.getElementById("navHistory").style.display="none";
        document.getElementById("navRedeem").style.display="none";
        document.getElementById("navAdmin").style.display="block";
        showPage("adminPanel");
      } else {
        document.getElementById("adminLoginMessage").innerText = "Invalid admin credentials";
      }
    });
}

// Dashboard
function loadDashboard(){
  const email = localStorage.getItem("userEmail");
  if(!email) return;
  fetch(`${BASE_URL}/get-user-data?email=${email}`)
    .then(res=>res.json())
    .then(data=>{
      document.getElementById("dashEmail").innerText = data.email;
      document.getElementById("dashUserID").innerText = data.userID;
      document.getElementById("dashCoins").innerText = data.coins;
    });
}

// History
function loadHistory(){
  const email = localStorage.getItem("userEmail");
  fetch(`${BASE_URL}/coin-history?email=${email}`)
    .then(res=>res.json())
    .then(data=>{
      const list=document.getElementById("coinHistory");
      list.innerHTML="";
      if(!data.history.length){ list.innerHTML="<li>No history</li>"; return; }
      data.history.forEach(e=>{
        const li=document.createElement("li");
        li.textContent=`${e.coins} SM Coins - ${e.type} on ${new Date(e.date).toLocaleDateString()}`;
        list.appendChild(li);
      });
    });
}

// Redeem
function redeemCoins(){
  fetch(`${BASE_URL}/redeem-coins`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      userID: document.getElementById("redeemUserID").value,
      coins: parseInt(document.getElementById("redeemCoins").value),
      upi: document.getElementById("redeemUPI").value
    })
  }).then(res=>res.json())
    .then(data=> document.getElementById("redeemMsg").innerText = data.message)
    .catch(()=> document.getElementById("redeemMsg").innerText = "Failed to submit");
}

// Admin Panel Load Requests
function loadWithdrawRequests(){
  fetch(`${BASE_URL}/get-withdraw-requests`)
    .then(res=>res.json())
    .then(data=>{
      const tbody=document.querySelector("#withdrawTable tbody");
      tbody.innerHTML="";
      data.requests.forEach(r=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${r.userID}</td><td>${r.coins}</td><td>${r.upi}</td>
          <td>
            <button class="btn" onclick="approveRequest('${r.id}')">Approve</button>
            <button class="btn" onclick="rejectRequest('${r.id}')">Reject</button>
          </td>`;
        tbody.appendChild(tr);
      });
    });
}
function approveRequest(id){
  fetch(`${BASE_URL}/approve-withdrawal`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})
  }).then(()=>loadWithdrawRequests());
}
function rejectRequest(id){
  fetch(`${BASE_URL}/reject-withdrawal`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})
  }).then(()=>loadWithdrawRequests());
}

// On load
window.onload=()=>{
  const isAdmin = localStorage.getItem("isAdmin");
  if(isAdmin==="true"){
    document.getElementById("loginModal").style.display="none";
    document.getElementById("navDashboard").style.display="none";
    document.getElementById("navHistory").style.display="none";
    document.getElementById("navRedeem").style.display="none";
    document.getElementById("navAdmin").style.display="block";
    showPage("adminPanel");
  } else if(localStorage.getItem("userEmail")){
    document.getElementById("loginModal").style.display="none";
    document.getElementById("navAdmin").style.display="none";
    showPage("dashboard");
  }
};
</script>
</body>
</html>
