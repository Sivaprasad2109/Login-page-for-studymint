<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studymint - Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .balance-box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
    }
    .download-section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
    }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }
    .file-item:last-child {
      border-bottom: none;
    }
    button {
      background: #4CAF50;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Studymint</h1>
  </header>
  <div class="container">
    <div class="balance-box">
      <h2>Your Balance: <span id="coinBalance">50</span> SmCoins</h2>
    </div>

    <!-- Download Section -->
    <div class="download-section">
      <h2>Available Downloads</h2>
      <div class="file-item">
        <span>Mathematics Notes.pdf</span>
        <button onclick="downloadFile('Mathematics_Notes.pdf', this)">Download</button>
      </div>
      <div class="file-item">
        <span>EEE Handwritten Notes.pdf</span>
        <button onclick="downloadFile('EEE_Notes.pdf', this)">Download</button>
      </div>
      <div class="file-item">
        <span>C Programming Basics.pdf</span>
        <button onclick="downloadFile('C_Basics.pdf', this)">Download</button>
      </div>
    </div>
  </div>

  <script>
    // Load balance (simulate login with 50 coin bonus)
    let balance = localStorage.getItem("coinBalance") 
                  ? parseInt(localStorage.getItem("coinBalance")) 
                  : 50;

    document.getElementById("coinBalance").textContent = balance;

    function downloadFile(filename, btn) {
      if (balance > 0) {
        balance -= 1;  // Deduct 1 SmCoin
        localStorage.setItem("coinBalance", balance);
        document.getElementById("coinBalance").textContent = balance;

        // Simulate download
        const link = document.createElement("a");
        link.href = "files/" + filename;  // put files in "files" folder
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

      } else {
        alert("Not enough SmCoins to download!");
        btn.disabled = true;
      }
    }
  </script>
</body>
</html>
