<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Studymint User Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
    header { background: #2c3e50; color: #fff; padding: 15px; text-align: center; }
    nav { display: flex; justify-content: center; background: #34495e; }
    nav a { color: #fff; padding: 14px 20px; text-decoration: none; }
    nav a:hover { background: #2c3e50; }
    section { display: none; padding: 20px; }
    section.active { display: block; }
    .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
    button { padding: 10px 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #219150; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Studymint</h1>
  </header>

  <nav>
    <a href="#" onclick="showSection('dashboard')">Dashboard</a>
    <a href="#" onclick="showSection('download')">Download</a>
    <a href="#" onclick="showSection('redeem')">Redeem</a>
    <a href="#" onclick="showSection('history')">History</a>
    <a href="#" onclick="showSection('admin')">Admin</a>
  </nav>

  <!-- Dashboard -->
  <section id="dashboard" class="active">
    <div class="card">
      <h2>Dashboard</h2>
      <p><strong>Email:</strong> <span id="userEmail">user@example.com</span></p>
      <p><strong>User ID:</strong> <span id="userId">123456</span></p>
      <p><strong>Balance:</strong> <span id="coinBalance">0</span> SM Coins</p>
    </div>
  </section>

  <!-- Download Section -->
  <section id="download">
    <div class="card">
      <h2>Download Files</h2>
      <table>
        <thead>
          <tr>
            <th>File Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="fileList">
          <!-- Files dynamically inserted -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- Redeem -->
  <section id="redeem">
    <div class="card">
      <h2>Redeem Coins</h2>
      <p>Redeem your SM coins into digital cash.</p>
      <button onclick="redeemCoins()">Redeem Now</button>
    </div>
  </section>

  <!-- History -->
  <section id="history">
    <div class="card">
      <h2>Coin History</h2>
      <ul id="historyList"></ul>
    </div>
  </section>

  <!-- Admin -->
  <section id="admin">
    <div class="card">
      <h2>Admin Panel</h2>
      <p>Approve uploads and manage users here.</p>
    </div>
  </section>

  <script>
    // -------------------- User Data --------------------
    let user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
      user = {
        email: "user@example.com",
        id: Math.floor(100000 + Math.random() * 900000), // 6-digit unique
        coins: 50,  // Signup bonus
        history: ["Signup Bonus: +50 SM"]
      };
      localStorage.setItem("user", JSON.stringify(user));
    }

    // -------------------- UI Load --------------------
    document.getElementById("userEmail").innerText = user.email;
    document.getElementById("userId").innerText = user.id;
    document.getElementById("coinBalance").innerText = user.coins;
    renderHistory();

    // -------------------- Navigation --------------------
    function showSection(id) {
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // -------------------- Redeem --------------------
    function redeemCoins() {
      if (user.coins >= 10) {
        user.coins -= 10;
        user.history.push("Redeemed 10 SM");
        saveUser();
        updateUI();
      } else {
        alert("Not enough coins to redeem!");
      }
    }

    // -------------------- File Download --------------------
    const files = [
      { name: "Math Notes.pdf", url: "files/math.pdf" },
      { name: "Physics Guide.pdf", url: "files/physics.pdf" },
      { name: "EEE Circuits.pdf", url: "files/eee.pdf" }
    ];

    function renderFiles() {
      let html = "";
      files.forEach((file, index) => {
        html += `
          <tr>
            <td>${file.name}</td>
            <td><button onclick="downloadFile(${index})">Download</button></td>
          </tr>
        `;
      });
      document.getElementById("fileList").innerHTML = html;
    }

    function downloadFile(index) {
      if (user.coins >= 1) {
        user.coins -= 1;
        user.history.push("Downloaded " + files[index].name + " (-1 SM)");
        saveUser();
        updateUI();
        // Trigger file download
        window.open(files[index].url, "_blank");
      } else {
        alert("Not enough SM coins!");
      }
    }

    // -------------------- Helpers --------------------
    function saveUser() {
      localStorage.setItem("user", JSON.stringify(user));
    }

    function updateUI() {
      document.getElementById("coinBalance").innerText = user.coins;
      renderHistory();
    }

    function renderHistory() {
      let list = document.getElementById("historyList");
      list.innerHTML = "";
      user.history.forEach(entry => {
        let li = document.createElement("li");
        li.innerText = entry;
        list.appendChild(li);
      });
    }

    // -------------------- Init --------------------
    renderFiles();
  </script>
</body>
</html>
