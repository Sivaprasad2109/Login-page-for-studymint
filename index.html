<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyMint</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    header { background:#222; color:#fff; padding:15px; text-align:center; }
    nav { background:#333; padding:10px; }
    nav a { color:#fff; margin:0 15px; text-decoration:none; font-weight:bold; }
    .page { display:none; padding:20px; }
    .active { display:block; }
    .panel { background:#fff; padding:20px; margin:10px auto; border-radius:8px; max-width:600px; box-shadow:0 0 8px rgba(0,0,0,0.2); }
    .btn { background:#007bff; color:#fff; padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
    .btn:hover { background:#0056b3; }
    input, select { padding:8px; width:100%; margin:8px 0; border:1px solid #ccc; border-radius:4px; }
    ul { list-style:none; padding:0; }
    li { margin:8px 0; padding:10px; border:1px solid #ddd; border-radius:5px; background:#fafafa; }
    .admin-section { background:#eef; padding:15px; border-radius:8px; }
  </style>
</head>
<body>
<header>
  <h1>📚 StudyMint Portal</h1>
</header>
<nav>
  <a href="#" onclick="showPage('dashboard')">Dashboard</a>
  <a href="#" onclick="showPage('history')">Coin History</a>
  <a href="#" onclick="showPage('redeem')">Redeem Coins</a>
  <a href="#" onclick="showPage('downloads'); loadDownloads()">Downloads</a>
  <a href="#" onclick="showPage('admin')">Admin Panel</a>
</nav>

<!-- User Dashboard -->
<div id="dashboard" class="page active">
  <div class="panel">
    <h2>User Dashboard</h2>
    <p><b>Email:</b> <span id="userEmail"></span></p>
    <p><b>UserID:</b> <span id="userID"></span></p>
    <p><b>Coins:</b> <span id="userCoins"></span></p>
  </div>
</div>

<!-- Coin History -->
<div id="history" class="page">
  <div class="panel">
    <h2>Coin History</h2>
    <ul id="coinHistory"></ul>
  </div>
</div>

<!-- Redeem Coins -->
<div id="redeem" class="page">
  <div class="panel">
    <h2>Redeem Coins</h2>
    <form id="redeemForm">
      <input type="text" id="redeemUserID" placeholder="User ID" required>
      <input type="number" id="redeemCoins" placeholder="Number of Coins" required>
      <input type="text" id="redeemUPI" placeholder="UPI ID" required>
      <button type="submit" class="btn">Redeem</button>
    </form>
    <p id="redeemMsg"></p>
  </div>
</div>

<!-- Downloads -->
<div id="downloads" class="page">
  <div class="panel">
    <h2>Available Files</h2>
    <ul id="fileList"></ul>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin" class="page">
  <div class="panel admin-section">
    <h2>Admin Panel</h2>
    <h3>Pending Withdraw Requests</h3>
    <ul id="withdrawRequests"></ul>

    <h3>Upload File</h3>
    <form id="uploadForm" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit" class="btn">Upload</button>
    </form>
    <p id="uploadMsg"></p>
  </div>
</div>

<script>
const API = "https://login-page-for-studymint-1.onrender.com";

// ✅ Show page
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === "history") loadHistory();
  if (id === "admin") loadWithdrawRequests();
}

// ✅ Load Dashboard
function loadDashboard() {
  const email = localStorage.getItem("userEmail");
  if (!email) return;
  fetch(`${API}/get-user-data?email=${email}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("userEmail").innerText = data.email;
      document.getElementById("userID").innerText = data.userID;
      document.getElementById("userCoins").innerText = data.coins;
      document.getElementById("redeemUserID").value = data.userID;
    });
}

// ✅ Load Coin History
function loadHistory() {
  const email = localStorage.getItem("userEmail");
  fetch(`${API}/coin-history?email=${email}`)
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("coinHistory");
      list.innerHTML = "";
      data.history.forEach(h => {
        const li = document.createElement("li");
        li.textContent = `${h.date} - ${h.type} : ${h.coins} coins`;
        list.appendChild(li);
      });
    });
}

// ✅ Redeem Coins
document.getElementById("redeemForm").addEventListener("submit", e => {
  e.preventDefault();
  const email = localStorage.getItem("userEmail");
  const userID = document.getElementById("redeemUserID").value;
  const coins = parseInt(document.getElementById("redeemCoins").value);
  const upi = document.getElementById("redeemUPI").value;
  fetch(`${API}/redeem-coins`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, userID, coins, upi })
  })
    .then(res => res.json())
    .then(data => {
      document.getElementById("redeemMsg").innerText = data.message;
      if (data.success) { loadDashboard(); loadHistory(); }
    });
});

// ✅ Load Downloads
function loadDownloads() {
  fetch(`${API}/get-files`)
    .then(res => res.json())
    .then(files => {
      const list = document.getElementById("fileList");
      list.innerHTML = "";
      if (!files.length) { list.innerHTML = "<li>No files available</li>"; return; }
      files.forEach(file => {
        const li = document.createElement("li");
        li.innerHTML = `${file.name} 
          <button class="btn" onclick="downloadFile('${file.id}')">Download (10 Coins)</button>`;
        list.appendChild(li);
      });
    });
}

// ✅ Download File (deduct 10 coins)
function downloadFile(fileId) {
  const email = localStorage.getItem("userEmail");
  fetch(`${API}/download-file`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, fileId })
  })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        alert("Download started!");
        window.open(data.fileUrl, "_blank");
        loadDashboard(); loadHistory();
      } else {
        alert(data.message);
      }
    });
}

// ✅ Admin - Load Withdraw Requests
function loadWithdrawRequests() {
  fetch(`${API}/get-withdraw-requests`)
    .then(res => res.json())
    .then(requests => {
      const list = document.getElementById("withdrawRequests");
      list.innerHTML = "";
      if (!requests.length) { list.innerHTML = "<li>No requests</li>"; return; }
      requests.forEach(r => {
        const li = document.createElement("li");
        li.innerHTML = `${r.email} requested ${r.coins} coins 
          <button class="btn" onclick="approve('${r.id}')">Approve</button>
          <button class="btn" onclick="rejectReq('${r.id}','${r.email}',${r.coins})">Reject</button>`;
        list.appendChild(li);
      });
    });
}

function approve(id) {
  fetch(`${API}/approve-withdrawal`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ requestId:id })
  }).then(()=>loadWithdrawRequests());
}

function rejectReq(id,email,coins) {
  fetch(`${API}/reject-withdrawal`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ requestId:id,email,coins })
  }).then(()=>loadWithdrawRequests());
}

// ✅ Admin Upload File
document.getElementById("uploadForm").addEventListener("submit", e => {
  e.preventDefault();
  const formData = new FormData(e.target);
  fetch(`${API}/upload-file`, { method:"POST", body:formData })
    .then(res => res.json())
    .then(data => { document.getElementById("uploadMsg").innerText = data.message; loadDownloads(); });
});

// Auto load dashboard
loadDashboard();
</script>
</body>
</html>
