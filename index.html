<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyMint Coin Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f4ff;
      color: #002b5c;
    }
    nav {
      background-color: #002b5c;
      padding: 10px 20px;
      display: flex;
      justify-content: space-around;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .page {
      display: none;
      padding: 30px;
    }
    .active {
      display: block;
    }
    .panel {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }
    .panel h2 {
      margin-bottom: 20px;
    }
    .btn {
      background-color: #004c99;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #005ce6;
    }
  </style>
</head>
<body>

<nav>
  <a href="#" onclick="logout()">Logout</a>
  <a href="#" onclick="showPage('dashboard')">Dashboard</a>
  <a href="#" onclick="showPage('redeem')">Redeem Coins</a>
  <a href="#" onclick="showPage('history')">Coin History</a>
  <a href="#" onclick="showPage('downloads')">Downloads</a>
</nav>

<!-- Dashboard -->
<div id="dashboard" class="page active">
  <div class="panel">
    <h2>Dashboard</h2>
    <p><strong>Email:</strong> <span id="dashEmail">Loading...</span></p>
    <p><strong>User ID:</strong> <span id="dashUserID">Loading...</span></p>
    <p><strong>Coins:</strong> <span id="dashCoins">Loading...</span> SM Coins</p>
  </div>
</div>

<!-- Redeem -->
<div id="redeem" class="page">
  <div class="panel">
    <h2>Redeem Coins</h2>
    <input type="text" id="redeemUserID" placeholder="Enter User ID"><br><br>
    <input type="number" id="redeemCoins" placeholder="Enter coins"><br><br>
    <input type="text" id="redeemUPI" placeholder="Enter UPI ID"><br><br>
    <button class="btn" onclick="redeemCoins()">Submit Request</button>
    <p id="redeemMsg"></p>
  </div>
</div>

<!-- History -->
<div id="history" class="page">
  <div class="panel">
    <h2>Coin History</h2>
    <ul id="coinHistory"></ul>
  </div>
</div>

<!-- Downloads -->
<div id="downloads" class="page">
  <div class="panel">
    <h2>Download Files</h2>
    <p>Each download costs <strong>10 SM Coins</strong></p>
    <div id="fileList">
      <!-- Example files -->
      <button class="btn" onclick="downloadFile('sample1.pdf')">Download Sample 1</button><br><br>
      <button class="btn" onclick="downloadFile('sample2.pdf')">Download Sample 2</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 9999;">
  <div style="display: flex; gap:0; border-radius: 10px; overflow: hidden;">
    
    <!-- User Login (Blue Panel) -->
    <div style="flex:1; background:#004c99; color:white; padding:30px;">
      <h2>User Login</h2>
      <input type="email" id="loginEmail" placeholder="Enter email" style="width: 100%; padding: 10px; margin: 10px 0;">
      <button onclick="sendLoginOTP()" class="btn" style="background:white; color:#004c99;">Send OTP</button><br>
      <input type="text" id="loginOTP" placeholder="Enter OTP" style="width: 100%; padding: 10px; margin: 10px 0;">
      <button onclick="verifyLoginOTP()" class="btn" style="background:white; color:#004c99;">Verify OTP</button>
      <p id="loginMessage" style="color: yellow;"></p>
    </div>

    <!-- Admin Login (Black Panel) -->
    <div style="flex:1; background:black; color:white; padding:30px;">
      <h2>Admin Login</h2>
      <input type="text" id="adminUser" placeholder="Username" style="width: 100%; padding: 10px; margin: 10px 0;">
      <input type="password" id="adminPass" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0;">
      <button onclick="adminLogin()" class="btn" style="background:white; color:black;">Login</button>
      <p id="adminMessage" style="color: red;"></p>
    </div>
  </div>
</div>


<script>
  const BASE_URL = "https://login-page-for-studymint-1.onrender.com";

  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if (pageId === 'dashboard') loadDashboard();
    if (pageId === 'history') loadHistory();
  }

  async function redeemCoins() {
    const email = localStorage.getItem("userEmail");
    const userID = document.getElementById("redeemUserID").value;
    const coins = parseInt(document.getElementById("redeemCoins").value);
    const upi = document.getElementById("redeemUPI").value;

    const res = await fetch(`${BASE_URL}/redeem-coins`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, userID, coins, upi })
    });
    const data = await res.json();
    document.getElementById("redeemMsg").innerText = data.message;
    loadDashboard();
    loadHistory();
  }

  async function downloadFile(fileId) {
    const email = localStorage.getItem("userEmail");
    if (!email) return alert("Please login first");

    const res = await fetch(`${BASE_URL}/download-file`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, fileId })
    });
    const data = await res.json();

    if (data.success) {
      alert("10 SM Coins deducted. Download starting...");
      window.open(data.fileUrl, "_blank");
      loadDashboard();
      loadHistory();
    } else {
      alert("❌ " + data.message);
    }
  }

  function loadDashboard() {
    const email = localStorage.getItem("userEmail");
    if (!email) return;
    fetch(`${BASE_URL}/get-user-data?email=${email}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("dashEmail").innerText = data.email;
        document.getElementById("dashUserID").innerText = data.userID;
        document.getElementById("dashCoins").innerText = data.coins;
      });
  }

  function loadHistory() {
    const email = localStorage.getItem("userEmail");
    if (!email) return;
    fetch(`${BASE_URL}/coin-history?email=${email}`)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("coinHistory");
        list.innerHTML = "";
        if (!data.history.length) {
          list.innerHTML = "<li>No coin activity yet.</li>";
          return;
        }
        data.history.forEach(entry => {
          const li = document.createElement("li");
          li.textContent = `${entry.coins} SM Coins - ${entry.type} on ${new Date(entry.date).toLocaleDateString()}`;
          list.appendChild(li);
        });
      });
  }

  function logout() {
    localStorage.removeItem("userEmail");
    location.reload();
  }

  function sendLoginOTP() {
    const email = document.getElementById("loginEmail").value;
    fetch(`${BASE_URL}/send-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    })
    .then(res => res.json())
    .then(data => { document.getElementById("loginMessage").innerText = data.message; });
  }

  function verifyLoginOTP() {
    const email = document.getElementById("loginEmail").value;
    const otp = document.getElementById("loginOTP").value;
    fetch(`${BASE_URL}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    })
    .then(res => res.json())
    .then(data => {
      if (data.userID) {
        localStorage.setItem("userEmail", email);
        document.getElementById("loginModal").style.display = "none";
        loadDashboard();
        loadHistory();
      } else {
        document.getElementById("loginMessage").innerText = "Invalid OTP";
      }
    });
  }

  function adminLogin() {
    const username = document.getElementById("adminUser").value;
    const password = document.getElementById("adminPass").value;
    fetch(`${BASE_URL}/admin-login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        alert("Admin login successful!");
        document.getElementById("loginModal").style.display = "none";
      } else {
        document.getElementById("adminMessage").innerText = "Invalid credentials";
      }
    });
  }

  window.onload = () => {
    if (!localStorage.getItem("userEmail")) {
      document.getElementById("loginModal").style.display = "flex";
    } else {
      loadDashboard();
      loadHistory();
    }
  };
</script>
</body>
</html>
